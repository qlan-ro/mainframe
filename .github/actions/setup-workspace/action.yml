name: Setup workspace
description: pnpm, Node, and dependency install shared by CI jobs.

inputs:
  github-token:
    description: Token forwarded to pnpm install.
    required: true

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
      with:
        version: 10

    - uses: actions/setup-node@v7
      with:
        node-version: 22
        cache: 'pnpm'

    - run: pnpm install --frozen-lockfile
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
