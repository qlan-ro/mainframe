# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-workspace
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # types/dist and core/dist are import targets for the other packages;
      # both are plain tsc emits — no Vite/electron-vite bundling.
      - name: Build workspace dependencies
        run: pnpm build:types && pnpm build:core

      - name: Type check
        run: |
          pnpm --filter @qlan-ro/mainframe-ui typecheck
          pnpm --filter @qlan-ro/mainframe-core exec tsc --noEmit
          pnpm --filter @qlan-ro/mainframe-app-electron exec tsc --noEmit
          pnpm --filter @qlan-ro/mainframe-app-electron exec tsc --noEmit -p tsconfig.node.json

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    name: test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            command: pnpm --filter @qlan-ro/mainframe-core exec vitest run --maxWorkers=4
          - name: ui
            command: pnpm --filter @qlan-ro/mainframe-ui exec vitest run --maxWorkers=4
          - name: types-and-electron
            command: >-
              pnpm --filter @qlan-ro/mainframe-types exec vitest run --maxWorkers=4 &&
              pnpm --filter @qlan-ro/mainframe-app-electron exec vitest run --maxWorkers=4

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-workspace
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace dependencies
        run: pnpm build:types && pnpm build:core

      - name: Test
        run: ${{ matrix.command }}

  changeset-check:
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: git fetch origin main

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # This job only runs `changeset status`, which reads .changeset/ and git
      # history. Skip lifecycle scripts so it doesn't need a native toolchain
      # (node-pty / better-sqlite3 builds) that the minimal runner lacks.
      - run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changeset
        run: pnpm changeset status --since=origin/main
