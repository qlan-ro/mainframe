# Runs the app-tauri Playwright e2e suite in MOCK mode (E2E_MODE=mock): AI-coupled specs
# replay recorded NDJSON fixtures via the native Rust mock adapter, un-mockable specs auto-skip, and
# non-AI specs run for real. Mock mode makes NO Claude/Codex API calls, so this needs no secrets.
#
# The suite drives the built @qlan-ro/mainframe-ui bundle in headless Chromium against the
# Rust daemon (browser-mode harness, fixtures/app-tauri.ts) — no Electron or xvfb.
name: e2e-mock

# TEMPORARILY DISABLED from automatic PR/push runs (2026-07-06): the suite is too slow to gate
# PRs right now (~30 min serial; workers:1 because the app is stateful on one daemon port).
# Re-enable by uncommenting the pull_request / push triggers once the suite is parallelized
# (multi-worker + per-worker daemon ports).
#
# It IS wired into the Release pipeline: release.yml calls this workflow (workflow_call) on every
# tag push and auto-publishes the draft release when this suite finishes green. Still runnable on
# demand via workflow_dispatch.
on:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]
  workflow_dispatch: # manual trigger
  workflow_call: # invoked by release.yml as the auto-publish gate

# One run per ref; cancel superseded runs so PR pushes don't pile up jobs.
concurrency:
  group: e2e-mock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-mock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/core-rs

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep

      # node-pty belongs to app-electron and still installs with the workspace. Remove this with app-electron.
      - run: npm install -g node-gyp

      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # build:app:tauri builds types + the Rust daemon and bakes the UI
      # bundle for the e2e daemon port (31416, NOT prod 31415 — assertBundleTargetsTestPort
      # aborts otherwise).
      - run: pnpm --filter @qlan-ro/mainframe-e2e build:app:tauri
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - run: pnpm --filter @qlan-ro/mainframe-e2e exec playwright install --with-deps chromium

      # The harness and daemon run git operations (worktrees, status); the runner has no identity.
      - name: Configure git identity for the runner
        run: |
          git config --global user.email "e2e@mainframe.test"
          git config --global user.name "Mainframe E2E"
          git config --global init.defaultBranch main

      # MF_E2E_SKIP_BUILD: the bundle was built (and port-verified) above — each describe block
      # would otherwise rebuild it in beforeAll. MF_E2E_GLOBAL_TIMEOUT: the whole suite shares
      # one process budget (default 40 min starves the tail when every spec runs back-to-back).
      - run: E2E_MODE=mock MF_E2E_SKIP_BUILD=1 MF_E2E_GLOBAL_TIMEOUT=5400000 pnpm --filter @qlan-ro/mainframe-e2e exec playwright test --project=tauri

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7
