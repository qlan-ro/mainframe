name: Release on Version Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.title == 'chore: version packages'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Sync root package.json version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Consolidate changelogs
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const version = '${{ steps.version.outputs.version }}';

            // Collect entries from each package changelog
            const pkgDirs = fs.readdirSync('packages', { withFileTypes: true })
              .filter(d => d.isDirectory())
              .map(d => d.name);

            let combined = '';
            for (const pkg of pkgDirs) {
              const cl = path.join('packages', pkg, 'CHANGELOG.md');
              if (!fs.existsSync(cl)) continue;
              const content = fs.readFileSync(cl, 'utf8');

              // Extract only the section for this version
              const versionHeader = '## ' + version;
              const start = content.indexOf(versionHeader);
              if (start === -1) continue;
              const nextHeader = content.indexOf('\n## ', start + versionHeader.length);
              const section = nextHeader === -1
                ? content.slice(start + versionHeader.length)
                : content.slice(start + versionHeader.length, nextHeader);

              if (section.trim()) {
                combined += section.trimEnd() + '\n';
              }

              // Delete the per-package changelog
              fs.unlinkSync(cl);
            }

            if (!combined.trim()) {
              console.log('No changelog entries found for version ' + version);
              process.exit(0);
            }

            // Prepend to root CHANGELOG.md
            const rootCl = 'CHANGELOG.md';
            const existing = fs.existsSync(rootCl) ? fs.readFileSync(rootCl, 'utf8') : '# Changelog\n';
            const header = '# Changelog';
            const headerEnd = existing.indexOf('\n', existing.indexOf(header));
            const before = existing.slice(0, headerEnd + 1);
            const after = existing.slice(headerEnd + 1);
            const newEntry = '\n## ' + version + '\n' + combined;
            fs.writeFileSync(rootCl, before + newEntry + '\n' + after);
            console.log('Consolidated changelog for ' + version);
          "

      - name: Archive completed plan docs
        run: |
          mkdir -p docs/plans/completed
          moved=0
          for f in docs/plans/*.md; do
            [ -f "$f" ] || continue
            basename=$(basename "$f")
            # Skip files without a date prefix
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-'; then
              continue
            fi
            mv "$f" docs/plans/completed/
            moved=$((moved + 1))
          done
          echo "Archived $moved plan docs"

      - name: Commit consolidation to main and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: prepare release ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
            echo "::notice::Pushed release prep commit to main"
          else
            echo "No cleanup changes to commit"
          fi
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "::notice::Tagged ${{ steps.version.outputs.tag }} — Release workflow will start"
