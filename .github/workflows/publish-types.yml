name: Publish @qlan-ro/mainframe-types

on:
  push:
    tags:
      - 'types-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Only builds/publishes the pure-TS types package; no native code.
      # Skip lifecycle scripts so node-pty/better-sqlite3 (no Linux prebuild)
      # don't need a native toolchain here.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build types
        run: pnpm --filter @qlan-ro/mainframe-types build

      - name: Publish
        run: pnpm --filter @qlan-ro/mainframe-types publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
