name: Release Daemon

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: bash scripts/build-standalone.sh ${{ matrix.target_os }} ${{ matrix.target_arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: mainframe-daemon-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist-standalone/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: |
          TAG=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }} 2>/dev/null || echo "")
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.name != ''
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: artifacts/*.tar.gz
          draft: true
          append_body: true
          body: |
            ---
            **Full Changelog**: [`CHANGELOG.md`](https://github.com/qlan-ro/mainframe/blob/${{ steps.tag.outputs.name }}/CHANGELOG.md)
          generate_release_notes: true
