name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      # Don't cancel the other platforms when one fails — we still want their artifacts.
      fail-fast: false
      matrix:
        # TEMPORARILY macOS-only (2026-07-06): Windows (pnpm-on-PATH in beforeBuildCommand)
        # and Linux (updater signing-key secret) release legs are disabled while the macOS
        # signing/notarization path is stabilized. Restore the windows-2022 (x64) and
        # ubuntu-latest (x64) entries once those are fixed.
        #
        # target_os/target_arch drive artifact naming; macos-latest is Apple Silicon
        # (arm64) as of the 2024 runner migration.
        include:
          - os: macos-latest
            target_os: macos
            target_arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      # node-pty has no Linux prebuild and compiles via `node-gyp rebuild`;
      # node-gyp is not on the install-script PATH on the runner.
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Package
        run: pnpm --filter @qlan-ro/mainframe-app-electron run package:ci
        env:
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-electron-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            packages/app-electron/dist/*.dmg
            packages/app-electron/dist/*.exe
            packages/app-electron/dist/*.AppImage
            packages/app-electron/dist/*.deb
            packages/app-electron/dist/*.rpm
            packages/app-electron/dist/*.zip
            packages/app-electron/dist/*.yml
            packages/app-electron/dist/*.yaml

  build-daemon:
    strategy:
      fail-fast: false
      matrix:
        # The daemon standalone build stays cross-platform (macOS + Linux) even while
        # the desktop/Tauri release legs are macOS-only — it has no signing dependency.
        include:
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # node-pty has no Linux prebuild and compiles via `node-gyp rebuild`;
      # node-gyp is not on the install-script PATH on the runner.
      - run: npm install -g node-gyp

      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: bash scripts/build-standalone.sh ${{ matrix.target_os }} ${{ matrix.target_arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: daemon-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist-standalone/*.tar.gz

  # Tauri desktop build (the WebKit/Chromium-neutral renderer under the Tauri shell).
  # tauri-action runs the app-tauri beforeBuildCommand (ui build + provision-node +
  # bundle-daemon), then `cargo tauri build`, signs the updater artifacts, and
  # uploads the installers + a merged multi-platform latest.json to this tag's draft
  # release (find-or-create — coexists with the `release` job's softprops upload).
  build-app-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # TEMPORARILY macOS-only (2026-07-06) — see build-desktop note. Windows
        # (pnpm-on-PATH in the tauri beforeBuildCommand) and Linux (updater signing-key
        # secret) are disabled until fixed; restore the ubuntu/windows entries then.
        #
        # macos-13 (Intel) removed 2026-07-07: GitHub-hosted macOS Intel runners are
        # no longer being provisioned for this repo — the leg sat `queued` with no
        # runner across every release run, indefinitely blocking the pipeline. Ship
        # Apple Silicon only; re-add an Intel leg via a self-hosted runner if needed.
        include:
          - os: macos-14 # Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Two Cargo workspaces: the Tauri shell and (for the opt-in
          # `bundle:canary` / `tauri:build:canary` path) the ported Rust daemon.
          # core-rs only compiles when the canary build runs — caching it keeps
          # that build fast without affecting the default Node-only bundle.
          workspaces: |
            packages/app-tauri/src-tauri
            packages/core-rs

      # Tauri's Linux build needs the system WebKitGTK / GTK stack.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # node-pty has no Linux prebuild; bundle-daemon ships its built .node, so the
      # install must compile it (node-gyp is not on the install-script PATH).
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build the workspace TS the Tauri bundle depends on (types → core → ui).
      # tauri-action's beforeBuildCommand re-runs the ui build, provisions the Node
      # sidecar, and bundles the daemon before `cargo tauri build`.
      - name: Build workspace dependencies
        run: pnpm --filter "@qlan-ro/mainframe-core..." --filter "@qlan-ro/mainframe-ui..." build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Import the Developer ID cert into a keychain BEFORE tauri-action runs.
      # tauri-action's beforeBuildCommand (`pnpm ... bundle`) codesigns the nested
      # daemon Mach-O binaries (better-sqlite3/fsevents/node-pty/rg/node) — but Tauri
      # only imports the cert during its OWN later .app-signing phase, so without this
      # the bundle-daemon codesign fails with "item could not be found in the keychain".
      # With the cert already in a keychain here, both our nested signing and Tauri's
      # .app signing find the identity. We therefore DON'T pass APPLE_CERTIFICATE to
      # tauri-action below (it would spin up a second keychain → ambiguous identity).
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signature (verified by the in-app updater against the pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID code-signing + notarization. The cert is imported into
          # the keychain by the "Import Apple Developer ID certificate" step above, so
          # we deliberately do NOT set APPLE_CERTIFICATE here — Tauri signs the .app
          # using the identity already in that keychain. APPLE_SIGNING_IDENTITY is the
          # full identity name (e.g. "Developer ID Application: Name (TEAMID)"); Tauri
          # needs it explicitly. Empty on non-macOS runners → tauri-action skips signing.
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          projectPath: packages/app-tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          # Any tag with a pre-release suffix (v2.0.0-rc.1, -nightly.N, …) is a
          # pre-release, so it never becomes the "latest" release the in-app updater
          # tracks. Clean vX.Y.Z tags publish as stable.
          prerelease: ${{ contains(github.ref_name, '-') }}

      # tauri-action uploads the installer as `Mainframe_<ver>_<arch>.dmg` (arch =
      # aarch64|x64) — a name that says neither "tauri" nor a consistent arch, and
      # collides in spirit with the Electron dmg. Rename it in place to the shared
      # `Mainframe-tauri-<tag>-macos-<arch>.dmg` scheme (arch normalized to arm64|x64).
      #
      # <ver> in the source name is tauri.conf.json's static "version" field (currently
      # "2.0.0"), which does NOT track the prerelease suffix — a v2.0.0-rc.8 tag still
      # produces `Mainframe_2.0.0_aarch64.dmg`. Use $TAG for the renamed version instead,
      # matching the Electron dmg naming (which does carry the rc suffix) and the
      # canary dmg naming below.
      #
      # We rename ONLY the .dmg: it's the user-facing installer and is NOT referenced by
      # latest.json (the macOS updater downloads the `.app.tar.gz`), so renaming is safe
      # for the updater flow. The GitHub API PATCH renames the asset without re-uploading.
      # Idempotent: renamed assets no longer match `^Mainframe_`, so re-runs skip them.
      - name: Normalize Tauri dmg asset name
        if: runner.os == 'macOS'
        # Cosmetic asset rename — never let it fail the job (and, via `needs`, the release).
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # tauri-action creates the release as a DRAFT, and GET /releases/tags/{tag}
          # returns published releases only (404s on drafts). Find it by listing.
          release_id=$(gh api "repos/$REPO/releases?per_page=100" \
            --jq "[.[] | select(.tag_name == \"$TAG\")][0].id // empty")
          if [ -z "$release_id" ]; then
            echo "No release found for $TAG yet — skipping dmg rename."
            exit 0
          fi
          version="${TAG#v}"
          gh api "repos/$REPO/releases/$release_id/assets" \
            -q '.[] | select(.name | test("^Mainframe_.*\\.dmg$")) | "\(.id) \(.name)"' \
          | while read -r id name; do
              new=$(printf '%s' "$name" \
                | sed -E "s/^Mainframe_.+_aarch64\.dmg\$/Mainframe-tauri-${version}-macos-arm64.dmg/;
                          s/^Mainframe_.+_x64\.dmg\$/Mainframe-tauri-${version}-macos-x64.dmg/")
              echo "Renaming $name -> $new"
              gh api -X PATCH "repos/$REPO/releases/assets/$id" -f name="$new" >/dev/null
            done

  # Rust-daemon canary variant (docs/rust-port/CUTOVER.md): bundles the ported
  # Rust daemon (packages/core-rs) alongside the Node sidecar so testers can
  # flip MAINFRAME_DAEMON_IMPL=rust at runtime. Same identifier/productName as
  # the default build — it's the same app with an extra opt-in binary, not a
  # fork — so it is DELIBERATELY NOT part of the auto-update channel: only the
  # .dmg installer is uploaded, never the .app.tar.gz/.sig, so it can never be
  # picked up by latest.json. Non-blocking (own job, not in build-app-tauri's
  # matrix): a canary failure must never stop the Node release from publishing.
  build-app-tauri-canary:
    runs-on: macos-14 # Apple Silicon (arm64) — matches build-app-tauri
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/app-tauri/src-tauri
            packages/core-rs

      # node-pty has no prebuild on this runner and compiles via `node-gyp rebuild`.
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Re-gate the Rust workspace at release time (rust-port.yml already gates
      # every PR touching packages/core-rs, but this is cheap insurance right
      # before we spend signing/notarization time on it — CUTOVER.md §6 step 2).
      - name: Rust workspace fmt/clippy/test gate
        working-directory: packages/core-rs
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --workspace
          tools/verify-gate.sh

      - name: Build workspace dependencies
        run: pnpm --filter "@qlan-ro/mainframe-core..." --filter "@qlan-ro/mainframe-ui..." build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Import Apple Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      # Plain `tauri build` (the @tauri-apps/cli devDependency, not tauri-action)
      # so this leg only builds+signs — it does NOT also create/upload to the
      # tag's GitHub release. A second tauri-action run against the same tag
      # would collide with build-app-tauri's asset names (identical productName
      # + version). The `--config` overlay's `beforeBuildCommand` runs
      # `bundle:canary`, which stages the Rust daemon binary via
      # provision-rust-daemon.mjs before Tauri packages it.
      - name: Build canary bundle (Node + Rust daemon)
        working-directory: packages/app-tauri
        run: pnpm exec tauri build --config src-tauri/tauri.rust-canary.conf.json
        env:
          # createUpdaterArtifacts is on globally, so the build needs a signing
          # key even though we never publish the updater artifacts it produces.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Rename in place so it can never collide with build-app-tauri's
      # `Mainframe_<ver>_aarch64.dmg` once both land in the `release` job's
      # merged `artifacts/` dir.
      - name: Rename canary dmg
        working-directory: packages/app-tauri/src-tauri/target/release/bundle/dmg
        run: |
          set -euo pipefail
          src=$(ls Mainframe_*_aarch64.dmg)
          mv "$src" "Mainframe-tauri-canary-${GITHUB_REF_NAME#v}-macos-arm64.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: app-tauri-canary-macos-arm64
          path: packages/app-tauri/src-tauri/target/release/bundle/dmg/Mainframe-tauri-canary-*.dmg

  release:
    needs: [build-desktop, build-daemon, build-app-tauri, build-app-tauri-canary]
    # Publish as long as the daemon built — the daemon tarballs back `mainframe update`
    # and must never be blocked by a desktop/Tauri build failure. `always()` overrides
    # the default "skip if any need failed"; download-artifact then attaches whatever
    # desktop/tauri artifacts did succeed.
    if: ${{ always() && needs.build-daemon.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          # Curated so build metadata (builder-debug.yml) never lands on the release.
          # electron-builder emits Mainframe-electron-<ver>-<os>-<arch> installers +
          # latest*.yml updater manifests; the daemon job emits daemon-<os>-<arch> tarballs.
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/latest*.yml
          draft: true
          # Mirror the tauri-action job: pre-release suffix → GitHub pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ---
            **Full Changelog**: [`CHANGELOG.md`](https://github.com/qlan-ro/mainframe/blob/${{ github.ref_name }}/CHANGELOG.md)
