name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-daemon:
    strategy:
      fail-fast: false
      matrix:
        # Cross-platform (macOS + Linux) even while the Tauri release leg is
        # macOS-only — the standalone daemon has no signing dependency.
        include:
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/core-rs

      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # `[workspace.package] version` stays pinned at "0.0.0" in the repo (see
      # packages/core-rs/Cargo.toml) — it feeds `mainframe --version`, /health's
      # version field, and `assert_not_downgrade` in cli/update.rs, all of which
      # would otherwise report "0.0.0" in every shipped build. Stamp the real tag
      # version in before the build reads it, mirroring the app-tauri stamp step
      # below. CI-local edit only, never committed. `cargo build` (no --locked)
      # freely rewrites Cargo.lock's matching workspace-member versions itself —
      # no separate lockfile edit needed.
      - name: Stamp release version into core-rs Cargo.toml
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"${version}\"/" packages/core-rs/Cargo.toml
          rm packages/core-rs/Cargo.toml.bak

      - run: bash scripts/build-standalone.sh ${{ matrix.target_os }} ${{ matrix.target_arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: daemon-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist-standalone/*.tar.gz

  # Tauri desktop build (the WebKit/Chromium-neutral renderer under the Tauri shell,
  # Rust daemon inside). tauri-action runs the app-tauri beforeBuildCommand (ui build +
  # provision-rust-daemon), then `cargo tauri build`, signs the updater artifacts, and
  # uploads the installers + a merged multi-platform latest.json to this tag's draft
  # release (find-or-create — coexists with the `release` job's softprops upload).
  build-app-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # TEMPORARILY macOS-only (2026-07-06): Windows (pnpm-on-PATH in the tauri
        # beforeBuildCommand) and Linux (updater signing-key secret) are disabled
        # until fixed; restore the ubuntu/windows entries then.
        #
        # macos-13 (Intel) removed 2026-07-07: GitHub-hosted macOS Intel runners are
        # no longer being provisioned for this repo — the leg sat `queued` with no
        # runner across every release run, indefinitely blocking the pipeline. Ship
        # Apple Silicon only; re-add an Intel leg via a self-hosted runner if needed.
        include:
          - os: macos-14 # Apple Silicon (arm64)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/app-tauri/src-tauri
            packages/core-rs

      # tauri-action's `tagName` input only names the GitHub release — it does NOT
      # stamp the app's own version. The bundle's version (baked into the binary
      # AND into latest.json's "version" field, which the in-app updater compares
      # against) comes from tauri.conf.json/Cargo.toml, which otherwise stay pinned
      # at the last hand-edited value (currently "2.0.0") across every release. That
      # means the updater compares e.g. "2.0.0" to "2.0.0" on every RC and never
      # finds an update. Stamp the real tag version in before the build reads it —
      # CI-local edit only, never committed.
      - name: Stamp release version into tauri.conf.json / Cargo.toml
        working-directory: packages/app-tauri/src-tauri
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          jq --arg v "$version" '.version = $v' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          # BSD sed (macOS runners) doesn't support GNU's "0,/regex/" range address;
          # the [package] version is the only bare `^version = ` line in this file,
          # so an unranged substitution is unambiguous.
          sed -i.bak "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          rm Cargo.toml.bak

      # The Tauri-bundled daemon binary comes from the same core-rs workspace
      # (tauri-action's beforeBuildCommand runs provision-rust-daemon.mjs, which
      # `cargo build`s packages/core-rs), so it needs the same stamp — otherwise
      # the bundled `mainframe-daemon --version` / /health still report "0.0.0"
      # even though the .app itself is correctly versioned. See the build-daemon
      # job's matching step for the full rationale.
      - name: Stamp release version into core-rs Cargo.toml
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"${version}\"/" packages/core-rs/Cargo.toml
          rm packages/core-rs/Cargo.toml.bak

      # Tauri's Linux build needs the system WebKitGTK / GTK stack.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build the workspace TS the Tauri bundle depends on (types → core → ui).
      # tauri-action's beforeBuildCommand re-runs the ui build and provisions the
      # Rust daemon binary before `cargo tauri build`.
      - name: Build workspace dependencies
        run: pnpm --filter "@qlan-ro/mainframe-core..." --filter "@qlan-ro/mainframe-ui..." build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Import the Developer ID cert into a keychain BEFORE tauri-action runs.
      # Import the cert into a keychain ahead of time rather than passing
      # APPLE_CERTIFICATE to tauri-action below — that input spins up its own
      # keychain, and importing here keeps a single, predictable identity for
      # Tauri's .app-signing phase to find.
      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signature (verified by the in-app updater against the pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID code-signing + notarization. The cert is imported into
          # the keychain by the "Import Apple Developer ID certificate" step above, so
          # we deliberately do NOT set APPLE_CERTIFICATE here — Tauri signs the .app
          # using the identity already in that keychain. APPLE_SIGNING_IDENTITY is the
          # full identity name (e.g. "Developer ID Application: Name (TEAMID)"); Tauri
          # needs it explicitly. Empty on non-macOS runners → tauri-action skips signing.
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          projectPath: packages/app-tauri
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          # Any tag with a pre-release suffix (v2.0.0-rc.1, -nightly.N, …) is a
          # pre-release, so it never becomes the "latest" release the in-app updater
          # tracks. Clean vX.Y.Z tags publish as stable.
          prerelease: ${{ contains(github.ref_name, '-') }}

      # tauri-action uploads the installer as `Mainframe_<ver>_<arch>.dmg` (arch =
      # aarch64|x64) — a name that says neither "tauri" nor a consistent arch. Rename
      # it in place to `Mainframe-tauri-<tag>-macos-<arch>.dmg` (arch normalized to
      # arm64|x64). Use $TAG rather than re-deriving from the (now tag-stamped, see
      # above) source filename so this rename stays correct even if that stamping
      # step ever changes.
      #
      # We rename ONLY the .dmg: it's the user-facing installer and is NOT referenced by
      # latest.json (the macOS updater downloads the `.app.tar.gz`), so renaming is safe
      # for the updater flow. The GitHub API PATCH renames the asset without re-uploading.
      # Idempotent: renamed assets no longer match `^Mainframe_`, so re-runs skip them.
      - name: Normalize Tauri dmg asset name
        if: runner.os == 'macOS'
        # Cosmetic asset rename — never let it fail the job (and, via `needs`, the release).
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # tauri-action creates the release as a DRAFT, and GET /releases/tags/{tag}
          # returns published releases only (404s on drafts). Find it by listing.
          release_id=$(gh api "repos/$REPO/releases?per_page=100" \
            --jq "[.[] | select(.tag_name == \"$TAG\")][0].id // empty")
          if [ -z "$release_id" ]; then
            echo "No release found for $TAG yet — skipping dmg rename."
            exit 0
          fi
          version="${TAG#v}"
          gh api "repos/$REPO/releases/$release_id/assets" \
            -q '.[] | select(.name | test("^Mainframe_.*\\.dmg$")) | "\(.id) \(.name)"' \
          | while read -r id name; do
              new=$(printf '%s' "$name" \
                | sed -E "s/^Mainframe_.+_aarch64\.dmg\$/Mainframe-tauri-${version}-macos-arm64.dmg/;
                          s/^Mainframe_.+_x64\.dmg\$/Mainframe-tauri-${version}-macos-x64.dmg/")
              echo "Renaming $name -> $new"
              gh api -X PATCH "repos/$REPO/releases/assets/$id" -f name="$new" >/dev/null
            done

  # The mock-mode Playwright suite, run in parallel with the builds (it compiles its own Rust
  # daemon + UI bundle, so it needs none of the release artifacts). It never gates the DRAFT — the
  # draft is always assembled by the `release` job below — it only decides whether `publish-release`
  # flips that draft to published. A failed/flaky/cancelled e2e run leaves the draft for a manual
  # publish, exactly as before this suite was wired in.
  e2e:
    uses: ./.github/workflows/e2e-mock.yml

  release:
    needs: [build-daemon, build-app-tauri]
    # Assemble the release as a DRAFT as long as the daemon built — the daemon tarballs back
    # `mainframe update` and must never be blocked by a Tauri build failure. `always()` overrides
    # the default "skip if any need failed". build-app-tauri uploads its own dmg/updater assets
    # straight to this tag's draft release via tauri-action, so download-artifact below only ever
    # picks up the daemon tarballs. It stays a draft here regardless of e2e; `publish-release`
    # promotes it to published only when the e2e gate is green.
    if: ${{ always() && needs.build-daemon.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          # The daemon job is the only upload-artifact producer left feeding
          # this download — build-app-tauri publishes straight to the release.
          files: |
            artifacts/*.tar.gz
          draft: true
          # Mirror the tauri-action job: pre-release suffix → GitHub pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ---
            **Full Changelog**: [`CHANGELOG.md`](https://github.com/qlan-ro/mainframe/blob/${{ github.ref_name }}/CHANGELOG.md)

  # Auto-publish gate: promote the draft to a published release once the e2e suite is green.
  # Runs only when BOTH the draft was assembled (`release`) and the mock e2e suite passed (`e2e`).
  # We PATCH only `draft=false` — the `prerelease` flag set by the `release`/tauri jobs (pre-release
  # suffix → GitHub pre-release) is left untouched, so an `-rc`/`-nightly` tag publishes as a
  # pre-release, not "latest". If e2e failed/was cancelled this job is skipped and the draft waits
  # for a manual publish.
  publish-release:
    needs: [release, e2e]
    if: ${{ always() && needs.release.result == 'success' && needs.e2e.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release (e2e is green)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # GET /releases/tags/{tag} 404s on drafts; list and match by tag instead (same as the
          # "Normalize Tauri dmg asset name" step above).
          release_id=$(gh api "repos/$REPO/releases?per_page=100" \
            --jq "[.[] | select(.tag_name == \"$TAG\")][0].id // empty")
          if [ -z "$release_id" ]; then
            echo "No release found for $TAG — nothing to publish." >&2
            exit 1
          fi
          gh api -X PATCH "repos/$REPO/releases/$release_id" -F draft=false >/dev/null
          echo "Published release $TAG (draft -> published)."
