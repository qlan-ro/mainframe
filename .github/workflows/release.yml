name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      # node-pty has no Linux prebuild and compiles via `node-gyp rebuild`;
      # node-gyp is not on the install-script PATH on the runner.
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Package
        run: pnpm --filter @qlan-ro/mainframe-app-electron exec electron-builder --publish never
        env:
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.os }}
          path: |
            packages/app-electron/dist/*.dmg
            packages/app-electron/dist/*.exe
            packages/app-electron/dist/*.AppImage
            packages/app-electron/dist/*.deb
            packages/app-electron/dist/*.rpm
            packages/app-electron/dist/*.zip
            packages/app-electron/dist/*.yml
            packages/app-electron/dist/*.yaml

  build-daemon:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target_os: darwin
            target_arch: arm64
          - os: ubuntu-latest
            target_os: linux
            target_arch: x64
          - os: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # node-pty has no Linux prebuild and compiles via `node-gyp rebuild`;
      # node-gyp is not on the install-script PATH on the runner.
      - run: npm install -g node-gyp

      - run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: bash scripts/build-standalone.sh ${{ matrix.target_os }} ${{ matrix.target_arch }}

      - uses: actions/upload-artifact@v7
        with:
          name: daemon-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: dist-standalone/*.tar.gz

  # Tauri desktop build (the WebKit/Chromium-neutral renderer under the Tauri shell).
  # tauri-action runs the app-tauri beforeBuildCommand (ui build + provision-node +
  # bundle-daemon), then `cargo tauri build`, signs the updater artifacts, and
  # uploads the installers + a merged multi-platform latest.json to this tag's draft
  # release (find-or-create — coexists with the `release` job's softprops upload).
  build-app-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon (arm64)
          - os: macos-13 # Intel (x86_64)
          - os: ubuntu-latest # Linux x86_64
          - os: ubuntu-24.04-arm # Linux ARM64
          - os: windows-latest # Windows x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app-tauri/src-tauri

      # Tauri's Linux build needs the system WebKitGTK / GTK stack.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # node-pty has no Linux prebuild; bundle-daemon ships its built .node, so the
      # install must compile it (node-gyp is not on the install-script PATH).
      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build the workspace TS the Tauri bundle depends on (types → core → ui).
      # tauri-action's beforeBuildCommand re-runs the ui build, provisions the Node
      # sidecar, and bundles the daemon before `cargo tauri build`.
      - name: Build workspace dependencies
        run: pnpm --filter "@qlan-ro/mainframe-core..." --filter "@qlan-ro/mainframe-ui..." build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/app-tauri
          tagName: ${{ github.ref_name }}
          releaseName: Mainframe ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false

  release:
    needs: [build-desktop, build-daemon, build-app-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
          body: |
            ---
            **Full Changelog**: [`CHANGELOG.md`](https://github.com/qlan-ro/mainframe/blob/${{ github.ref_name }}/CHANGELOG.md)
