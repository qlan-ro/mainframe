<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mainframe — Interactive Chat Cards (Review)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
  * { box-sizing: border-box; }
  /* global keyframes used by the cards (normally injected by 04-engine) */
  @keyframes twPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
  .tw-pulse { animation: twPulse 1.6s ease-in-out infinite; }
  @keyframes tw-spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  @keyframes tw-shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
  .tw-shimmer { background: linear-gradient(90deg, #bcbab5 25%, #5e5d5a 50%, #bcbab5 75%); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: tw-shimmer 2.2s linear infinite; }
  @keyframes tw-slidein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
  .tw-slidein { animation: tw-slidein 0.26s cubic-bezier(0.22,1,0.36,1) both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mainframe/01-base.jsx?v=ts93"></script>
<script type="text/babel" src="mainframe/10-chatcards.jsx?v=ts93"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { ThinkingBlock, AskUserQuestionCard, PermissionCard, PlanApprovalCard } = window;

// Frame wrapper that mimics the chat pane backdrop so cards read in context.
function ChatFrame({ children, pad = 22 }) {
  return (
    <div style={{ background: '#ffffff', width: '100%', height: '100%', padding: pad, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
      {children}
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="thinking" title="Thinking block" subtitle="Collapsible reasoning — live shimmer while streaming, then 'Thought for Ns'">
        <DCArtboard id="think-live" label="Streaming" width={420} height={150}>
          <ChatFrame><ThinkingBlock live/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="think-collapsed" label="Resolved · collapsed" width={420} height={150}>
          <ChatFrame><ThinkingBlock seconds={6}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="think-open" label="Resolved · expanded" width={560} height={340}>
          <ChatFrame><ThinkingBlock seconds={6} defaultOpen paragraphs={[
            'The ask is a sidebar that collapses to an icon rail, with the state persisted. The risk is the rail toggle being owned in two places — confirm the data flow before editing.',
            'Persistence has a few viable homes. I shouldn’t assume — worth one quick question so I match the existing convention.',
          ]}/></ChatFrame>
        </DCArtboard>
      </DCSection>

      <DCSection id="ask" title="Ask-a-question card" subtitle="Single-select resolves on click · multi-select & 'Other' resolve on submit · answered state persists. Interactive — try it.">
        <DCArtboard id="ask-open" label="Single-select · awaiting" width={560} height={320}>
          <ChatFrame><AskUserQuestionCard
            question="How should the rail state persist?"
            context="The store doesn't persist layout yet. I want to match the codebase convention."
            options={[
              { label: 'Zustand persist middleware', hint: 'Reuse the store’s existing disk hook' },
              { label: 'localStorage directly', hint: 'Smallest change, but a one-off pattern' },
              { label: 'electron-store (main process)', hint: 'Survives across windows; heavier wiring' },
            ]}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="ask-short" label="Two options" width={460} height={230}>
          <ChatFrame><AskUserQuestionCard
            question="Open the diff before or after tests pass?"
            options={[{ label: 'After tests pass', hint: 'Only surface a clean diff' }, { label: 'Now', hint: 'Review as I go' }]}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="ask-other" label="Single-select + Other (free text)" width={560} height={380}>
          <ChatFrame><AskUserQuestionCard
            allowOther
            question="Which test runner should I wire up?"
            context="Pick one, or type your own if it isn’t listed."
            options={[
              { label: 'Vitest', hint: 'Already a dev dependency' },
              { label: 'Jest', hint: 'More config, broader ecosystem' },
            ]}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="ask-multi" label="Multi-select + Other" width={560} height={420}>
          <ChatFrame><AskUserQuestionCard
            multi allowOther
            question="Which surfaces should the rail toggle affect?"
            context="Select all that apply — I’ll scope the change to just these."
            options={[
              { label: 'Sidebar', hint: 'Primary navigation' },
              { label: 'Activity panel', hint: 'Right-hand inspector' },
              { label: 'Status bar', hint: 'Bottom strip' },
            ]}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="ask-answered" label="Answered · persisted" width={560} height={300}>
          <ChatFrame><AskUserQuestionCard
            defaultAnswer={0}
            question="How should the rail state persist?"
            options={[
              { label: 'Zustand persist middleware', hint: 'Reuse the store’s existing disk hook' },
              { label: 'localStorage directly', hint: 'Smallest change, but a one-off pattern' },
            ]}/></ChatFrame>
        </DCArtboard>
      </DCSection>

      <DCSection id="perm" title="Permission card" subtitle="Bound to the real ControlRequest — toolName · input (JSON under Details) · suggestions. Deny · Allow once · Always allow (only when suggestions exist).">
        <DCArtboard id="perm-bash" label="Bash · has suggestions" width={560} height={250}>
          <ChatFrame><PermissionCard
            toolName="Bash"
            input={{ command: 'pnpm test layout', description: 'Run the layout test suite' }}
            suggestions={[{ ruleName: 'Bash', ruleValue: 'pnpm test:*' }]}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="perm-write" label="WriteFile · no suggestions" width={560} height={230}>
          <ChatFrame><PermissionCard
            toolName="WriteFile"
            input={{ file_path: 'components/RailIcons.tsx', content: "import React from 'react';\n\nexport function RailIcons({ sections, active }) {\n  …\n}" }}/></ChatFrame>
        </DCArtboard>
        <DCArtboard id="perm-detail" label="Details expanded" width={560} height={340}>
          <ChatFrame><PermissionCard
            defaultOpen
            toolName="Bash"
            input={{ command: 'git push --force origin test/all-prs-merged' }}
            suggestions={[{ ruleName: 'Bash', ruleValue: 'git push:*' }]}/></ChatFrame>
        </DCArtboard>
      </DCSection>

      <DCSection id="plan" title="Plan approval card" subtitle="Multi-step plan with touched files. Approve & run shows the executing state.">
        <DCArtboard id="plan-open" label="Awaiting approval" width={560} height={500}>
          <ChatFrame><PlanApprovalCard
            title="Collapse sidebar to an icon rail"
            summary="Going with the Zustand persist middleware. The header hook is already one-way, so it needs no change."
            steps={[
              { text: 'Add a persisted `mode` field and `toggleRail` action to the layout store.', files: ['store/layout.ts'] },
              { text: 'Render an icon-rail branch when mode === rail; bind ⌘1 to toggle.', files: ['Sidebar.tsx', 'RailIcons.tsx'] },
              { text: 'Delete the legacy free-form dock — fully superseded by zone tabs.', files: ['old-dock.ts'] },
            ]}/></ChatFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
