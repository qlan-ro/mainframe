<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mainframe — Popovers (Review)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
  * { box-sizing: border-box; }
  @keyframes twPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
  .tw-pulse { animation: twPulse 1.6s ease-in-out infinite; }
  @keyframes tw-spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  @keyframes tw-shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
  @keyframes tw-slidein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
  .tw-slidein { animation: tw-slidein 0.26s cubic-bezier(0.22,1,0.36,1) both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mainframe/01-base.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/02-chrome.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/03-content.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/11-usermessages.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/13-popover.jsx?v=ts132"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;

// A warm "floating over the workspace" stage. Popovers are shown OPEN inline so
// the matrix is reviewable without driving each trigger.
function Stage({ children, pad = 26, align = 'flex-start', bg = T.windowBg }) {
  return (
    <div style={{ width: '100%', height: '100%', background: bg, padding: pad,
      display: 'flex', alignItems: 'flex-start', justifyContent: align }}>
      {children}
    </div>
  );
}
// Small grey note used inside an artboard to describe a primitive.
function Note({ children }) {
  return <div style={{ fontFamily: MONO, fontSize: 10.5, color: T.text3, marginBottom: 9 }}>{children}</div>;
}

const PERM_MODES = [
  { id: 'ask', label: 'Ask every time', note: 'Approve each tool call', color: T.text3 },
  { id: 'edits', label: 'Allow edits', note: 'Auto-approve file writes', color: T.green },
  { id: 'auto', label: 'Unattended', note: 'No prompts — full auto', color: T.red },
];
const EFFORT = [
  { id: 'low', label: 'Low effort', note: 'Fast, shallow reasoning' },
  { id: 'med', label: 'Medium effort', note: 'Balanced' },
  { id: 'high', label: 'High effort', note: 'Slow, thorough' },
];

function App() {
  return (
    <DesignCanvas>

      {/* ───────────────── Anatomy / primitives ───────────────── */}
      <DCSection id="anatomy" title="Anatomy"
        subtitle="One surface (PopCard) + one kit of row primitives. Every popover in the app is composed from these — see mainframe/13-popover.jsx.">

        <DCArtboard id="surface" label="PopCard · section label · divider · footnote" width={300} height={250}>
          <Stage>
            <PopCard width={236}>
              <PopLabel>Section</PopLabel>
              <PopMenuRow icon="doc" label="A menu row" hint="⌘1"/>
              <PopMenuRow icon="folder" label="Another row" hint="⌘2"/>
              <PopDivider/>
              <PopMenuRow icon="gear" label="Settings…"/>
              <PopFootNote>Footnote — quiet helper text.</PopFootNote>
            </PopCard>
          </Stage>
        </DCArtboard>

        <DCArtboard id="menurows" label="Menu rows — hint · note · danger · disabled" width={300} height={250}>
          <Stage>
            <PopCard width={236}>
              <PopMenuRow icon="pencil" label="Rename" hint="↵"/>
              <PopMenuRow icon="branch" iconColor={ACCENT} label="Open in worktree" note="Run on an isolated branch"/>
              <PopMenuRow icon="archive" label="Archive (disabled)" disabled/>
              <PopDivider/>
              <PopMenuRow icon="trash" label="Delete" hint="⌫" danger/>
            </PopCard>
          </Stage>
        </DCArtboard>

        <DCArtboard id="selectrows" label="Select rows — single-select · dot · meta" width={300} height={235}>
          <Stage>
            <PopCard width={236}>
              <PopSelectRow selected label="Selected option" note="Has the checkmark"/>
              <PopSelectRow label="Plain option"/>
              <PopSelectRow dot={T.green} label="With status dot" meta="meta"/>
              <PopSelectRow dot={T.amber} label="Another" meta={<BranchDivergence ahead={3} behind={1}/>}/>
            </PopCard>
          </Stage>
        </DCArtboard>

        <DCArtboard id="checkrows" label="Check rows — multi-select · swatch" width={280} height={210}>
          <Stage>
            <PopCard width={210}>
              <PopCheckRow checked swatch="#dc3545" label="bug"/>
              <PopCheckRow checked swatch="#0a84ff" label="refactor"/>
              <PopCheckRow swatch="#28a745" label="feature"/>
              <PopCheckRow swatch="#a855f7" label="design"/>
            </PopCard>
          </Stage>
        </DCArtboard>

        <DCArtboard id="search" label="Search field + empty state" width={300} height={235}>
          <Stage>
            <PopCard width={236}>
              <PopLabel>Find</PopLabel>
              <PopSearchField value="zzz" onChange={() => {}} placeholder="Search…"/>
              <PopEmpty icon="magnifyingglass">No match for “zzz”.</PopEmpty>
            </PopCard>
          </Stage>
        </DCArtboard>

        <DCArtboard id="form" label="Form pieces — field · select · actions" width={320} height={280}>
          <Stage>
            <PopCard width={256} pad={10}>
              <PopField label="Name">
                <input defaultValue="feat/new-thing" spellCheck={false} style={POP_INPUT}/>
              </PopField>
              <PopField label="Base">
                <PopSelectInput value="main" onChange={() => {}} options={['main', 'develop']}/>
              </PopField>
              <PopActions onCancel={() => {}} onConfirm={() => {}} confirmLabel="Create" confirmIcon="checkmark"/>
            </PopCard>
          </Stage>
        </DCArtboard>
      </DCSection>

      {/* ───────────────── Menu flavors ───────────────── */}
      <DCSection id="menus" title="Menus"
        subtitle="The recurring menu shapes: context (right-click), action menus with sections, and single-select dropdowns.">

        <DCArtboard id="context" label="Context menu — session right-click" width={260} height={360}>
          <Stage><ContextMenu inline/></Stage>
        </DCArtboard>

        <DCArtboard id="context-tab" label="Context menu — tab right-click" width={260} height={300}>
          <Stage>
            <ContextMenu inline width={196} items={[
              { icon: 'copy', label: 'Copy path', hint: '⌘C' },
              { icon: 'eye', label: 'Reveal in Files' },
              { icon: 'square.split.1x2', label: 'Split right' },
              { divider: true },
              { icon: 'xmark', label: 'Close tab', hint: '⌘W' },
              { icon: 'rectangle.stack', label: 'Close others', danger: true },
            ]}/>
          </Stage>
        </DCArtboard>

        <DCArtboard id="action" label="Action menu — sections + hints (new-tab)" width={280} height={340}>
          <Stage>
            <PopCard width={214} pad={4}>
              <PopLabel>New terminal</PopLabel>
              <PopMenuRow icon="terminal" iconColor="#5ac8fa" label="New terminal" hint="zsh"/>
              <PopDivider m="4px 8px"/>
              <PopLabel>Launch configuration</PopLabel>
              <PopMenuRow icon="eye" iconColor="#1f8a5b" label="Preview" hint="preview"/>
              <PopMenuRow icon="terminal" label="API server" hint="process"/>
              <PopMenuRow icon="eye" iconColor="#1f8a5b" label="Storybook" hint="preview"/>
            </PopCard>
          </Stage>
        </DCArtboard>

        <DCArtboard id="select-perm" label="Single-select — permission (REAL ComposerSelect)" width={260} height={200}>
          <Stage><ComposerSelect inline icon="shield" options={PERM_MODES} value="edits" onChange={() => {}}/></Stage>
        </DCArtboard>

        <DCArtboard id="select-effort" label="Single-select — reasoning effort (REAL)" width={260} height={200}>
          <Stage><ComposerSelect inline icon="gauge" options={EFFORT} value="med" onChange={() => {}}/></Stage>
        </DCArtboard>
      </DCSection>

      {/* ───────────────── Git ───────────────── */}
      <DCSection id="git" title="Git"
        subtitle="The branch switcher — search + fetch, global actions, and a list grouped into Local · per-worktree sections · Remote. Click any branch to fly out its side submenu. Plus the merge / rebase conflicts halt-state. Wired live into the toolbar breadcrumb + status bar.">

        <DCArtboard id="branch" label="Branch switcher — Local + worktree sections" width={350} height={430}>
          <Stage><BranchPopover inline/></Stage>
        </DCArtboard>

        <DCArtboard id="branch-submenu" label="Branch submenu — per-branch git actions (worktree branch)" width={600} height={430}>
          <Stage><BranchPopover inline defaultSelected="feat/popover-system"/></Stage>
        </DCArtboard>

        <DCArtboard id="branch-submenu-current" label="Branch submenu — current branch (actions disabled)" width={600} height={430}>
          <Stage><BranchPopover inline defaultSelected="test/all-prs-merged"/></Stage>
        </DCArtboard>

        <DCArtboard id="branch-create" label="Branch switcher — typed query → create row" width={350} height={250}>
          <Stage><BranchPopover inline initialQuery="feat/onboard"/></Stage>
        </DCArtboard>

        <DCArtboard id="newbranch" label="New branch — form popover" width={350} height={330}>
          <Stage><NewBranchPopover inline initialName="feat/popover-system"/></Stage>
        </DCArtboard>

        <DCArtboard id="conflicts" label="Merge / rebase conflicts — halt-state" width={350} height={400}>
          <Stage><ConflictsPopover inline/></Stage>
        </DCArtboard>

        <DCArtboard id="conflicts-rebase" label="Conflicts — rebase, fewer files" width={350} height={310}>
          <Stage><ConflictsPopover inline op="rebase" files={['src/git/BranchPopover.tsx', 'src/state/sessionStore.ts']}/></Stage>
        </DCArtboard>
      </DCSection>

      {/* ───────────────── Tags ───────────────── */}
      <DCSection id="tags" title="Tags"
        subtitle="Tag editor — multi-select with a create-on-type affordance.">

        <DCArtboard id="tag" label="Tag editor — multi-select" width={280} height={320}>
          <Stage><TagPopover inline/></Stage>
        </DCArtboard>

        <DCArtboard id="tag-create" label="Tag editor — create new tag" width={280} height={230}>
          <Stage><TagPopover inline initial={[]} initialQuery="urgent"/></Stage>
        </DCArtboard>
      </DCSection>

      {/* ───────────────── Live / in situ ───────────────── */}
      <DCSection id="live" title="Live · in situ (real components)"
        subtitle="The actual workspace surfaces — click the controls to drive the real popovers (model, permission, effort, worktree, branch, launch). Proof the system matches live usage.">

        <DCArtboard id="composer" label="Composer — click any chip to open its popover" width={680} height={150}>
          <div style={{ background: '#fff', width: '100%', height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', padding: '0 22px 16px' }}>
            <Composer embedded sessionEmpty/>
          </div>
        </DCArtboard>

        <DCArtboard id="toolbar" label="Toolbar — branch breadcrumb + launch picker" width={680} height={120}>
          <div style={{ background: T.content, width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', borderBottom: `0.5px solid ${T.hairline}` }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontFamily: FONT, fontSize: 13, fontWeight: 600, color: T.text, letterSpacing: -0.2 }}>
              <span>mainframe</span>
              <span style={{ fontWeight: 400, color: T.text4 }}>|</span>
              <BranchPopover trigger={({ toggle, open }) => (
                <button onClick={toggle} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, height: 22, padding: '0 6px', borderRadius: 6, border: 'none', cursor: 'pointer', background: open ? T.rowHover : 'transparent', fontFamily: MONO, fontSize: 11.5, fontWeight: 400, color: T.text2 }}>
                  <Icon name="branch" size={11} color={T.text3}/><span>{BRANCH_CURRENT}</span><Icon name="chevron.down" size={8} color={T.text4}/>
                </button>
              )}/>
            </div>
            <LaunchPicker/>
          </div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
