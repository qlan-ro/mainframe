<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mainframe — Primitives & Icons</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  :root {
    --paper: #f3f1ec; --card: #ffffff; --ink: #1c1c1e; --ink2: #5e5d5a;
    --ink3: #92918d; --ink4: #bcbab5; --line: rgba(0,0,0,0.10); --hair: rgba(0,0,0,0.06);
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 64px 40px 120px; }

  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink3); }
  h1 { font-size: 40px; line-height: 1.05; letter-spacing: -1px; margin: 14px 0 0; font-weight: 700; }
  .lede { font-size: 15px; line-height: 1.6; color: var(--ink2); max-width: 640px; margin: 18px 0 0; letter-spacing: -0.1px; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
  .pill { font-family: var(--mono); font-size: 11.5px; color: var(--ink2); background: rgba(0,0,0,0.045); border: 0.5px solid var(--line); padding: 5px 11px; border-radius: 999px; }
  .pill b { color: var(--ink); font-weight: 600; }

  section { margin-top: 56px; }
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; }
  .sec-num { font-family: var(--mono); font-size: 13px; color: var(--ink4); font-weight: 500; }
  .sec-head h2 { font-size: 23px; letter-spacing: -0.5px; margin: 0; font-weight: 700; }
  .sec-sub { font-size: 13px; line-height: 1.55; color: var(--ink2); margin: 6px 0 0; max-width: 680px; }
  .sec-sub code { font-family: var(--mono); font-size: 12px; background: rgba(0,0,0,0.05); padding: 1px 5px; border-radius: 4px; }

  .group { margin: 28px 0; }
  .group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--ink3); margin: 0 0 14px; display: flex; align-items: center; gap: 9px; }
  .group-title .maps { font-family: var(--mono); font-weight: 500; letter-spacing: 0; color: var(--ink4); text-transform: none; }

  /* specimen cards */
  .specs { display: flex; flex-wrap: wrap; gap: 12px; }
  .spec { background: var(--card); border: 0.5px solid var(--line); border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); padding: 0; overflow: hidden; min-width: 150px; display: flex; flex-direction: column; }
  .spec-stage { padding: 22px 18px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; min-height: 64px; background: repeating-linear-gradient(45deg, transparent, transparent 9px, rgba(0,0,0,0.012) 9px, rgba(0,0,0,0.012) 10px); }
  .spec-cap { padding: 9px 12px; border-top: 0.5px solid var(--hair); }
  .spec-cap .nm { font-family: var(--mono); font-size: 11.5px; color: var(--ink); font-weight: 600; }
  .spec-cap .dt { font-size: 11px; color: var(--ink3); line-height: 1.45; margin-top: 2px; }

  /* icon grid */
  .icons { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 8px; }
  .ic { background: var(--card); border: 0.5px solid var(--line); border-radius: 10px; padding: 14px 8px 9px; display: flex; flex-direction: column; align-items: center; gap: 9px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  .ic .nm { font-family: var(--mono); font-size: 9.5px; color: var(--ink3); text-align: center; word-break: break-all; line-height: 1.3; }
  .note { font-size: 12px; color: var(--ink3); line-height: 1.55; margin-top: 14px; }
  .note code { font-family: var(--mono); font-size: 11.5px; background: rgba(0,0,0,0.05); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="mainframe/01-base.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/02-chrome.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/10-chatcards.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/12-todos.jsx?v=ts132"></script>

<script type="text/babel" data-presets="env,react">
// Primitives catalog — renders the REAL components/tokens from the loaded
// modules (shared global scope), so this page can't drift from the app.

const ICON_NAMES = [
  'chat','sparkles','code','doc','doc.text','folder','folder.fill','folder.git','folder.plus',
  'terminal','eye','eye.slash','grip','diff','branch','plus','checklist.box','xmark','checkmark',
  'lock','shield','gauge','clipboard','clipboard.check','worktree','exclamationmark.triangle',
  'locate','refresh','camera','frame','smartphone','trash','eraser','chevron.left','chevron.right',
  'chevron.down','chevron.up.down','magnifyingglass','sidebar.left','sidebar.right',
  'square.split.2x1','square.split.1x2','square.split.top2','square.grid.2x2','rectangle.stack',
  'ellipsis','paperclip','at','arrow.up','arrow.down','bolt','circle.dot','circle.dotted',
  'play.fill','stop.fill','pin','tag','arrow.clockwise','wifi','wand','wand.sparkles','bot',
  'archive','pop','gear','sun','moon','lightbulb','sliders','bell','keyboard','globe','info','cpu',
  'copy','return','pencil','quote','wrench','clock','photo','plug','layers','calendar','activity',
  'table','vector','doc.pdf','arrow.up.left.down.right','plus.magnifyingglass','minus.magnifyingglass',
];

function Spec({ name, dt, children }) {
  return (
    <div className="spec">
      <div className="spec-stage">{children}</div>
      <div className="spec-cap"><div className="nm">{name}</div>{dt && <div className="dt">{dt}</div>}</div>
    </div>
  );
}
function Section({ num, title, sub, children }) {
  return (
    <section>
      <div className="sec-head"><span className="sec-num">{num}</span><h2>{title}</h2></div>
      {sub && <p className="sec-sub" dangerouslySetInnerHTML={{ __html: sub }}/>}
      {children}
    </section>
  );
}
function Group({ title, maps, children }) {
  return (
    <div className="group">
      <div className="group-title">{title}{maps && <span className="maps">→ {maps}</span>}</div>
      <div className="specs">{children}</div>
    </div>
  );
}

// small stateful wrappers for interactive primitives
function SegDemo() { const [v, setV] = React.useState('default'); return <ExecModeSeg value={v} onChange={setV}/>; }
function CheckDemo({ init }) { const [c, setC] = React.useState(init); return <ClearContextCheck checked={c} onChange={setC}/>; }
function Radio({ on }) {
  return <span style={{ width: 17, height: 17, borderRadius: '50%', display: 'inline-block', border: `${on ? 5 : 1.5}px solid ${on ? ACCENT : T.text4}` }}/>;
}
function Checkbox({ on }) {
  return <span style={{ width: 17, height: 17, borderRadius: 5, border: `${on ? 0 : 1.5}px solid ${T.text4}`, background: on ? ACCENT : 'transparent', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{on && <Icon name="checkmark" size={11} color="#fff" stroke={2.6}/>}</span>;
}
function ResolvedPillDemo({ tone, icon, label }) {
  const c = tone === 'good' ? T.green : tone === 'bad' ? T.red : T.text3;
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontFamily: FONT, fontSize: 11, fontWeight: 600, color: c, background: `${c}14`, padding: '3px 9px 3px 7px', borderRadius: 20 }}><Icon name={icon} size={11} color={c} stroke={2.2}/>{label}</span>;
}
function IconBtn({ size }) {
  return <button style={{ width: size, height: size - 2, border: 'none', background: T.rowHover, borderRadius: 6, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="gear" size={Math.round(size * 0.55)} color={T.text2}/></button>;
}

function App() {
  return (
    <div className="wrap">
      <header>
        <div className="eyebrow">Mainframe · Design System</div>
        <h1>Primitives &amp; Icons</h1>
        <p className="lede">The atomic building blocks — buttons, pills, form controls, status indicators, and the full icon set — rendered live from the prototype's own components and tokens. This is the 1:1 visual target when theming the equivalent shadcn / assistant-ui primitives. Pair with <code style={{fontFamily:'var(--mono)',fontSize:12}}>component-map.md</code> (anatomy) and <code style={{fontFamily:'var(--mono)',fontSize:12}}>Design&nbsp;Tokens&nbsp;Report</code> (tokens).</p>
        <div className="meta-row">
          <span className="pill"><b>{ICON_NAMES.length}</b> icons</span>
          <span className="pill">single source: <b>real components</b></span>
          <span className="pill">theme: <b>light</b></span>
        </div>
      </header>

      <Section num="01" title="Buttons" sub="The shared <code>CardBtn</code> (3 kinds) plus the icon-button pattern used across the toolbar, sidebar, and cards. Primary carries the accent fill; ghost is the resting chrome button; danger is destructive.">
        <Group title="CardBtn" maps="shadcn Button (default / secondary / destructive)">
          <Spec name="kind=primary" dt="accent fill, white text"><CardBtn kind="primary" icon="checkmark">Approve</CardBtn></Spec>
          <Spec name="kind=ghost" dt="resting · hairline border"><CardBtn icon="pencil">Keep planning</CardBtn></Spec>
          <Spec name="kind=danger" dt="destructive action"><CardBtn kind="danger">Deny</CardBtn></Spec>
          <Spec name="disabled" dt="opacity 0.45 · no events"><CardBtn kind="primary" style={{ opacity: 0.45, pointerEvents: 'none' }}>Submit</CardBtn></Spec>
        </Group>
        <Group title="Icon buttons" maps='shadcn Button variant="ghost" size="icon"'>
          <Spec name="22px" dt="sidebar / group header"><IconBtn size={22}/></Spec>
          <Spec name="24px" dt="pane toolbars"><IconBtn size={24}/></Spec>
          <Spec name="28px" dt="main toolbar"><IconBtn size={28}/></Spec>
        </Group>
      </Section>

      <Section num="02" title="Pills &amp; badges" sub="Radius-full chips for filters, tags, status, and resolved states. Active = accent; resting = hover-surface fill or hairline.">
        <Group title="Filter pill" maps="shadcn Badge / Toggle">
          <Spec name='active "All"' dt="accent fill"><FilterPill label="All" active accent onClick={()=>{}}/></Spec>
          <Spec name="active + count" dt="trailing count badge"><FilterPill label="mainframe" active count={2} onClick={()=>{}}/></Spec>
          <Spec name="resting" dt="hover-surface fill"><FilterPill label="football-tracker" onClick={()=>{}}/></Spec>
        </Group>
        <Group title="Tag pill" maps="shadcn Badge (colored)">
          <Spec name="row variant" dt="solid color, white text"><TagPill name="agentic"/><TagPill name="refactor"/><TagPill name="ui"/></Spec>
          <Spec name="filter variant" dt="dot + label"><TagPill name="docs" variant="filter" active onClick={()=>{}}/></Spec>
        </Group>
        <Group title="Status / resolved" maps="shadcn Badge (tinted)">
          <Spec name="answered" dt="neutral"><ResolvedPillDemo tone="neutral" icon="checkmark" label="Answered"/></Spec>
          <Spec name="allowed" dt="good · green tint"><ResolvedPillDemo tone="good" icon="checkmark" label="Always allowed"/></Spec>
          <Spec name="denied" dt="bad · red tint"><ResolvedPillDemo tone="bad" icon="xmark" label="Denied"/></Spec>
        </Group>
        <Group title="Action pill" maps="shadcn Button (dashed ghost)">
          <Spec name="add (dashed)" dt="dashed outline = action, not filter">
            <span style={{ display:'inline-flex', alignItems:'center', gap:4, height:22, padding:'0 10px 0 8px', borderRadius:11, background:'transparent', border:`1px dashed ${T.borderH}`, color:T.text3, fontFamily:FONT, fontSize:11, fontWeight:600 }}><Icon name="folder.plus" size={12} color="currentColor"/>Add project</span>
          </Spec>
        </Group>
      </Section>

      <Section num="03" title="Form controls" sub="Inputs share the <code>tdInput</code> / <code>tdSelect</code> token style (radius 8px, hairline border, content2 fill). Checkbox / radio / segmented control match the chat-card patterns.">
        <Group title="Text fields" maps="shadcn Input / Textarea / Select">
          <Spec name="input" dt="tdInput · h auto, radius 8"><input style={{ ...tdInput, width: 180 }} placeholder="Task title"/></Spec>
          <Spec name="select" dt="tdSelect · custom chevron"><select style={{ ...tdSelect, width: 140 }}><option>Feature</option><option>Bug</option></select></Spec>
          <Spec name="textarea" dt="tdInput · multiline"><textarea rows={2} style={{ ...tdInput, width: 200, resize: 'none', lineHeight: 1.5 }} placeholder="Describe the task…"/></Spec>
        </Group>
        <Group title="Choice controls" maps="shadcn Checkbox / RadioGroup / Tabs(segmented)">
          <Spec name="radio" dt="single-select (Ask card)"><Radio on={false}/><Radio on={true}/></Spec>
          <Spec name="checkbox" dt="multi-select"><Checkbox on={false}/><Checkbox on={true}/></Spec>
          <Spec name="labeled check" dt="ClearContextCheck"><CheckDemo init={true}/></Spec>
          <Spec name="segmented" dt="ExecModeSeg · exec mode"><SegDemo/></Spec>
        </Group>
      </Section>

      <Section num="04" title="Indicators" sub="Session and task lifecycle dots. Spinners use a 0.9s rotation; in-progress states pulse.">
        <Group title="Session status (StatusDot)" maps="custom on shadcn Sidebar row">
          <Spec name="working" dt="spinner ring"><StatusDot status="working"/></Spec>
          <Spec name="idle" dt="muted dot"><StatusDot status="idle"/></Spec>
          <Spec name="unread" dt="accent dot"><StatusDot status="idle" unread/></Spec>
        </Group>
        <Group title="Task lifecycle (TdStatusDot)" maps="shadcn Checkbox (cycling)">
          <Spec name="open" dt="hollow ring"><TdStatusDot status="open" onCycle={()=>{}}/></Spec>
          <Spec name="in_progress" dt="pulsing accent"><TdStatusDot status="in_progress" onCycle={()=>{}}/></Spec>
          <Spec name="done" dt="green check"><TdStatusDot status="done" onCycle={()=>{}}/></Spec>
        </Group>
      </Section>

      <Section num="05" title="Icon library" sub={`The complete <code>Icon</code> set — ${ICON_NAMES.length} stroke glyphs on an 18&times;18 grid (default 1.6 stroke). Pass the quoted name to <code>&lt;Icon name="…"/&gt;</code>. Each maps to a lucide-react equivalent in the production app.`}>
        <div className="icons">
          {ICON_NAMES.map(n => (
            <div className="ic" key={n}>
              <Icon name={n} size={20} color={T.text}/>
              <span className="nm">{n}</span>
            </div>
          ))}
        </div>
        <p className="note">Glyphs are hand-tuned to read at 11–15px. In production, swap for the nearest <code>lucide-react</code> icon and keep the <b>1.6px stroke / round caps</b> so weight matches the chrome.</p>
      </Section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
