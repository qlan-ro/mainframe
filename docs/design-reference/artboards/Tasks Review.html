<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mainframe — Tasks (Review)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
  * { box-sizing: border-box; }
  /* global keyframes (normally injected by 04-engine, absent here) */
  @keyframes twPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
  @keyframes tw-spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  @keyframes tw-shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
  @keyframes tw-slidein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mainframe/01-base.jsx?v=ts132"></script>
<script type="text/babel" src="mainframe/12-todos.jsx?v=ts132"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TodosBoard, QuickTaskDialog, TdCard, TdEditModal, TdFilterBar, TD_PRI } = window;

// Card-only frame: a column-width slice of board backdrop so a card reads in context.
function CardFrame({ children, w = 300 }) {
  return (
    <div style={{ background: '#f8f6f2', width: '100%', height: '100%', padding: 14, display: 'flex', alignItems: 'center' }}>
      <div style={{ width: w, maxWidth: '100%' }}>{children}</div>
    </div>
  );
}
const noop = () => {};
const card = (over) => ({
  number: 42, title: 'Wire @-mentions in composer', body: '', status: 'open',
  type: 'feature', priority: 'medium', labels: ['composer', 'chat'], assignees: ['dana'],
  milestone: 'v1.2', dependencies: [], attachments: 0, created: '2026-05-20', updated: '2026-05-30', ...over,
});

// Filter bar harness (it's stateful; give it live state so chips/sort/search work).
function FilterBarDemo({ initial }) {
  const [filters, setFilters] = React.useState(initial || { types: [], priorities: [], labels: [], search: '' });
  const [sort, setSort] = React.useState({ key: 'number', dir: 'desc' });
  return (
    <div style={{ background: '#f8f6f2', width: '100%', height: '100%' }}>
      <TdFilterBar filters={filters} onChange={setFilters} allLabels={['ui','billing','chat','composer','docs','layout','review']} sort={sort} onSort={setSort}/>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="list" title="Tasks — list (agent-first, default)" subtitle="The real TodosBoard in list view. Grouped + collapsible, status-dot lifecycle, live running indicators, click a row to expand, ↑↓/↵/E/Space keyboard-first.">
        <DCArtboard id="list-live" label="Live list — expand · cycle status · start session" width={900} height={620}>
          <TodosBoard open embedded defaultView="list" onClose={noop}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="board" title="Board (alternate view)" subtitle="Same data, kanban layout — toggled via the List ⧉ Board control in the header. Drag cards between columns.">
        <DCArtboard id="board-live" label="Live board — drag · filter · sort" width={1180} height={620}>
          <TodosBoard open embedded defaultView="board" onClose={noop}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="cards" title="Board card — type & priority matrix" subtitle="The board-view TodoCard, one per variant. Hover reveals start / edit / delete.">
        <DCArtboard id="c-bug" label="Bug · Critical · attachments" width={340} height={150}>
          <CardFrame><TdCard todo={card({ number: 9, title: 'Composer drops attachment on rapid paste', type: 'bug', priority: 'critical', labels: ['composer'], attachments: 2 })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
        <DCArtboard id="c-feat" label="Feature · High" width={340} height={150}>
          <CardFrame><TdCard todo={card({ number: 12, title: 'Wire @-mentions in composer', type: 'feature', priority: 'high' })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
        <DCArtboard id="c-enh" label="Enhancement · Medium" width={340} height={150}>
          <CardFrame><TdCard todo={card({ number: 6, title: 'Auto-switch worktree after archiving a session', type: 'enhancement', priority: 'medium', labels: ['sessions','git'] })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
        <DCArtboard id="c-doc" label="Documentation · Low" width={340} height={150}>
          <CardFrame><TdCard todo={card({ number: 11, title: 'Document the launch-config schema', type: 'documentation', priority: 'low', labels: ['docs'] })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
        <DCArtboard id="c-dep" label="With dependency note" width={340} height={150}>
          <CardFrame><TdCard todo={card({ number: 5, title: 'Enable/disable notifications', type: 'feature', priority: 'low', labels: ['settings'], dependencies: [12] })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
        <DCArtboard id="c-done" label="Done · struck through" width={340} height={150}>
          <CardFrame><TdCard todo={card({ number: 8, title: 'Provider lock after first message', type: 'feature', priority: 'medium', status: 'done', labels: ['composer'] })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
        <DCArtboard id="c-long" label="Long title · many labels" width={340} height={170}>
          <CardFrame><TdCard todo={card({ number: 21, title: 'Reconcile remembered per-session layouts when switching worktrees mid-stream', type: 'bug', priority: 'high', labels: ['layout','sessions','git','perf'] })} onEdit={noop} onDelete={noop} onStart={noop}/></CardFrame>
        </DCArtboard>
      </DCSection>

      <DCSection id="filter" title="Filter bar" subtitle="Type / priority chips, labels popover, sort cycle, search. Default and pre-filtered states.">
        <DCArtboard id="f-empty" label="No filters" width={980} height={84}>
          <FilterBarDemo/>
        </DCArtboard>
        <DCArtboard id="f-active" label="Active filters — Bug + High + label" width={980} height={84}>
          <FilterBarDemo initial={{ types: ['bug'], priorities: ['high'], labels: ['composer'], search: '' }}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="edit" title="Create / edit modal" subtitle="The real TodoModal, embedded. Title, type/priority/status, description, attachments, labels, assignees, milestone.">
        <DCArtboard id="e-new" label="New task — empty" width={560} height={620}>
          <div style={{ position: 'relative', width: '100%', height: '100%', background: '#efe9df' }}>
            <TdEditModal todo={null} embedded allLabels={[]} onClose={noop} onSave={noop} onDelete={noop} onStart={noop}/>
          </div>
        </DCArtboard>
        <DCArtboard id="e-edit" label="Edit existing — in progress" width={560} height={620}>
          <div style={{ position: 'relative', width: '100%', height: '100%', background: '#efe9df' }}>
            <TdEditModal embedded allLabels={['composer','chat']} onClose={noop} onSave={noop} onDelete={noop} onStart={noop}
              todo={{ number: 12, title: 'Wire @-mentions in composer', body: 'Trigger the context picker on @, insert a pill, and attach the referenced file/symbol to the turn.', status: 'in_progress', type: 'feature', priority: 'high', labels: ['composer','chat'], assignees: ['dana','lee'], milestone: 'v1.2', dependencies: [], created: '2026-05-24', updated: '2026-06-02' }}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="quick" title="Quick-add dialog (⌘⇧T)" subtitle="The real QuickTaskDialog, embedded — fast capture: type toggle, title, details, priority.">
        <DCArtboard id="q-quick" label="Quick task" width={500} height={400}>
          <div style={{ position: 'relative', width: '100%', height: '100%', background: '#efe9df' }}>
            <QuickTaskDialog open embedded onClose={noop} onCreate={noop}/>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
