<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mainframe — File Viewers (Review)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
  * { box-sizing: border-box; }
  /* global keyframes (normally injected by 04-engine, absent here) */
  @keyframes twPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
  @keyframes tw-spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  @keyframes tw-shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
  @keyframes tw-slidein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mainframe/01-base.jsx?v=ts112"></script>
<script type="text/babel" src="mainframe/08-markdown.jsx?v=ts112"></script>
<script type="text/babel" src="mainframe/15-viewers.jsx?v=ts112"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { MarkdownViewer, CsvViewer, ImageViewer, SvgViewer, PdfViewer, UnsupportedViewer } = window;

// A viewer always lives inside a Files-surface pane: a white card with a
// hairline + soft shadow. Frame mirrors that so the chrome reads true.
function Pane({ children }) {
  return (
    <div style={{
      width: '100%', height: '100%', display: 'flex', flexDirection: 'column',
      background: '#fff', border: '0.5px solid rgba(0,0,0,0.08)', borderRadius: 10, overflow: 'hidden',
      boxShadow: '0 1px 3px rgba(0,0,0,0.05)',
    }}>{children}</div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="markdown" title="Markdown viewer" subtitle="Reuses the real window.MD renderer (single source of truth). Preview ⇄ Source toggle in the header; word/line count in the status row. Reached by opening any .md file.">
        <DCArtboard id="md-preview" label="README.md — Preview (rendered)" width={760} height={560}>
          <Pane><MarkdownViewer file="README.md"/></Pane>
        </DCArtboard>
        <DCArtboard id="md-source" label="CHANGELOG.md — Preview" width={620} height={520}>
          <Pane><MarkdownViewer file="CHANGELOG.md"/></Pane>
        </DCArtboard>
      </DCSection>

      <DCSection id="csv" title="CSV viewer" subtitle="A real data table — sticky header, zebra rows, row-number gutter, right-aligned numeric columns (auto-detected). Click a header to sort (asc → desc → off); filter box narrows rows live. Reached by opening any .csv file.">
        <DCArtboard id="csv-metrics" label="metrics.csv — sortable + filter" width={760} height={420}>
          <Pane><CsvViewer file="metrics.csv"/></Pane>
        </DCArtboard>
        <DCArtboard id="csv-usage" label="usage.csv — numeric-heavy" width={760} height={360}>
          <Pane><CsvViewer file="usage.csv"/></Pane>
        </DCArtboard>
      </DCSection>

      <DCSection id="image" title="Image viewer" subtitle="Checkerboard transparency backdrop, Fit ⇄ 100% with zoom in/out, dimension + size in the status row. Honest striped placeholder stands in for an asset we don't ship. Reached by opening .png / .jpg / .gif / .webp.">
        <DCArtboard id="img-fit" label="hero-screenshot.png — fit to window" width={680} height={460}>
          <Pane><ImageViewer file="hero-screenshot.png"/></Pane>
        </DCArtboard>
        <DCArtboard id="img-square" label="onboarding.png — square" width={520} height={460}>
          <Pane><ImageViewer file="onboarding.png"/></Pane>
        </DCArtboard>
      </DCSection>

      <DCSection id="svg" title="SVG viewer" subtitle="Preview ⇄ Code. Preview renders the vector on a checkerboard card; Code shows the source. viewBox + intrinsic size in the status row. Reached by opening .svg.">
        <DCArtboard id="svg-preview" label="logo.svg — Preview" width={560} height={440}>
          <Pane><SvgViewer file="logo.svg"/></Pane>
        </DCArtboard>
        <DCArtboard id="svg-code" label="badge.svg — Preview (diamond mark)" width={560} height={440}>
          <Pane><SvgViewer file="badge.svg"/></Pane>
        </DCArtboard>
      </DCSection>

      <DCSection id="pdf" title="PDF viewer" subtitle="Paged sheet on a grey canvas with page shadow; ◀ page ▶ navigation, Fit ⇄ Width, page indicator in the status row. Mock rendered pages (serif body, figure placeholders). Reached by opening .pdf.">
        <DCArtboard id="pdf-spec" label="spec.pdf — multi-page (use ◀ ▶)" width={640} height={620}>
          <Pane><PdfViewer file="spec.pdf"/></Pane>
        </DCArtboard>
        <DCArtboard id="pdf-design" label="design-review.pdf" width={640} height={620}>
          <Pane><PdfViewer file="design-review.pdf"/></Pane>
        </DCArtboard>
      </DCSection>

      <DCSection id="fallback" title="No-preview fallback" subtitle="The default route for binaries Mainframe can't render inline — a calm card with Open externally / Reveal in tree.">
        <DCArtboard id="unsupported" label="archive.zip — no preview" width={620} height={380}>
          <Pane><UnsupportedViewer file="vendor-bundle.zip"/></Pane>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
