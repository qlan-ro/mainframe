<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mainframe — Window States (Review)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
  * { box-sizing: border-box; }
  /* global keyframes (normally injected by 04-engine, absent here) */
  @keyframes twPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
  @keyframes tw-spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
  @keyframes tw-shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
  @keyframes tw-slidein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mainframe/01-base.jsx?v=ts112"></script>
<script type="text/babel" src="mainframe/14-windowstates.jsx?v=ts112"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { MfToaster, ConnectionOverlay, TutorialOverlay, ErrorState } = window;
const noop = () => {};

// Fills an artboard with a workspace-tinted positioning context so the
// absolute-positioned overlays (Connection / Error) have a frame to cover.
function Frame({ children, bg = '#e9e7e2' }) {
  return <div style={{ position: 'relative', width: '100%', height: '100%', background: bg, overflow: 'hidden' }}>{children}</div>;
}

const TOAST_STACK = [
  { id: 't1', type: 'success', title: 'Session merged', description: 'refactor/auth-flow → main · 14 files, +312 −88.' },
  { id: 't2', type: 'info',    title: 'Agent finished', description: 'Fix flaky tests · 3 tools run, all checks green.', chatId: 's1' },
  { id: 't3', type: 'warning', title: 'Worktree has uncommitted changes', description: 'Stash or commit before switching branches.' },
  { id: 't4', type: 'error',   title: 'Build failed', description: 'tsc exited 2 — Type error in SessionView.tsx:142. Click to open the session.', chatId: 's1' },
];

function ToastFrame({ seed }) {
  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', background: '#e9e7e2', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', right: 16, bottom: 16 }}>
        <MfToaster embedded seed={seed}/>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="toaster" title="Toaster" subtitle="The real MfToaster, embedded. Bottom-right stack, max 5. Warm white cards with a tinted status chip; auto-dismiss toasts carry a thin countdown rail, errors persist. Any code fires one via window.mfToast({type,title,description}).">
        <DCArtboard id="toast-stack" label="Stack — success · info · warning · error" width={400} height={420}>
          <ToastFrame seed={TOAST_STACK}/>
        </DCArtboard>
        <DCArtboard id="toast-success" label="Success — auto-dismiss + countdown rail" width={400} height={150}>
          <ToastFrame seed={[TOAST_STACK[0]]}/>
        </DCArtboard>
        <DCArtboard id="toast-info" label="Info — clickable (opens session)" width={400} height={150}>
          <ToastFrame seed={[TOAST_STACK[1]]}/>
        </DCArtboard>
        <DCArtboard id="toast-error" label="Error — persists until dismissed" width={400} height={160}>
          <ToastFrame seed={[TOAST_STACK[3]]}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="connection" title="Connection overlay" subtitle="Daemon disconnected. Calm warm scrim + centred card with an orbiting indicator, a reassuring secondary line, and an indeterminate progress rail. No fake reconnect button — the prototype has no such mechanism.">
        <DCArtboard id="conn" label="Reconnecting to daemon…" width={900} height={560}>
          <Frame>
            <ConnectionOverlay open embedded/>
          </Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="tutorial" title="First-run tour (TutorialOverlay)" subtitle="Spotlight coachmark tour over a self-contained mock workspace strip. Soft scrim cut-out + accent halo on the target, a LIGHT label card with Back / Next / Skip and a step-dot rail. Live, it portals to <body> and targets real chrome via [data-tut]; this artboard mounts the real component in embedded mode. Drive it with the buttons.">
        <DCArtboard id="tour" label="Step 1 of 3 — drive Next/Back/Skip" width={600} height={400}>
          <Frame bg="#efe9df">
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <TutorialOverlay embedded onClose={noop}/>
            </div>
          </Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="error" title="Error state" subtitle="The MfErrorBoundary fallback. Calm centred panel, the error message in a mono detail block, primary Try again + secondary Reload / Copy details. Honest about what's safe (session + files unaffected).">
        <DCArtboard id="err" label="Render error caught" width={620} height={420}>
          <Frame>
            <ErrorState embedded onRetry={noop}
              error={{ message: "Cannot read properties of undefined (reading 'messages')\n    at SessionView (renderer/components/center/SessionView.tsx:142)\n    at renderWithHooks (react-dom.development.js:15486)" }}/>
          </Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
