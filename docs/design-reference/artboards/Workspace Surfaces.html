<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakToggle, TweakSelect, TweakButton } = window;

// Zoomable / pannable stage — fit-to-window; ⌘/Ctrl+scroll to zoom; drag the
// empty backdrop (or ⌘/space+drag) to pan.
function ZoomStage({ designW, designH, children }) {
  const [vp, setVp] = useState({ w: window.innerWidth, h: window.innerHeight });
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const panning = useRef(null);
  useEffect(() => {
    const r = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', r);
    return () => window.removeEventListener('resize', r);
  }, []);
  const pad = 48;
  const fit = Math.min((vp.w - pad) / designW, (vp.h - pad) / designH, 1.4);
  const scale = fit * zoom;
  const clamp = (z) => Math.min(4, Math.max(0.25, z));
  const reset = () => { setZoom(1); setPan({ x: 0, y: 0 }); };
  const onWheel = useCallback((e) => {
    if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom((z) => clamp(z * (1 - e.deltaY * 0.0015))); }
    else { setPan((p) => ({ x: p.x - e.deltaX, y: p.y - e.deltaY })); }
  }, []);
  useEffect(() => {
    const el = document.getElementById('zoomstage');
    if (!el) return;
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [onWheel]);
  useEffect(() => {
    const onKey = (e) => {
      if (!(e.metaKey || e.ctrlKey)) return;
      if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom(z => clamp(z * 1.15)); }
      else if (e.key === '-') { e.preventDefault(); setZoom(z => clamp(z / 1.15)); }
      else if (e.key === '0') { e.preventDefault(); reset(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  const startPan = (e) => {
    panning.current = { sx: e.clientX, sy: e.clientY, px: pan.x, py: pan.y };
    const onMove = (ev) => {
      if (!panning.current) return;
      setPan({ x: panning.current.px + (ev.clientX - panning.current.sx), y: panning.current.py + (ev.clientY - panning.current.sy) });
    };
    const onUp = () => { panning.current = null; document.body.style.cursor = ''; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    document.body.style.cursor = 'grabbing';
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  useEffect(() => {
    const el = document.getElementById('zoomstage');
    if (!el) return;
    const onDownCapture = (e) => {
      const forcePan = e.metaKey || e.ctrlKey || e.button === 1;
      if (!forcePan) return;
      e.preventDefault(); e.stopPropagation(); startPan(e);
    };
    el.addEventListener('mousedown', onDownCapture, true);
    return () => el.removeEventListener('mousedown', onDownCapture, true);
  });
  const onBackdropDown = (e) => {
    if (e.metaKey || e.ctrlKey || e.button === 1) return;
    if (e.target.closest('[data-app-root]')) return;
    startPan(e);
  };
  const zbtn = {
    width: 30, height: 30, borderRadius: 8, border: 'none', cursor: 'pointer',
    background: 'rgba(255,255,255,0.8)', backdropFilter: 'blur(20px)',
    color: '#1c1c1e', fontSize: 16, fontWeight: 500,
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    boxShadow: '0 1px 3px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.08)',
  };
  return (
    <div id="zoomstage" onMouseDown={onBackdropDown} style={{
      position: 'fixed', inset: 0, overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      cursor: panning.current ? 'grabbing' : 'default',
    }}>
      <div data-app-root style={{
        width: designW, height: designH, flexShrink: 0,
        transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})`,
        transformOrigin: 'center center',
        transition: panning.current ? 'none' : 'transform 0.08s ease-out',
      }}>{children}</div>
      <div style={{
        position: 'fixed', bottom: 18, left: '50%', transform: 'translateX(-50%)',
        display: 'flex', alignItems: 'center', gap: 6, zIndex: 100, padding: 5, borderRadius: 11,
        background: 'rgba(245,243,239,0.7)', backdropFilter: 'blur(24px) saturate(180%)',
        boxShadow: '0 6px 20px rgba(0,0,0,0.14), 0 0 0 0.5px rgba(0,0,0,0.08)',
        fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif',
      }}>
        <button style={zbtn} title="Zoom out (⌘−)" onClick={() => setZoom(z => clamp(z / 1.15))}>−</button>
        <button onClick={reset} title="Reset zoom (⌘0)" style={{
          minWidth: 52, height: 30, padding: '0 10px', borderRadius: 8, border: 'none',
          cursor: 'pointer', background: 'transparent', color: '#1c1c1e',
          fontSize: 12, fontWeight: 600, fontVariantNumeric: 'tabular-nums',
        }}>{Math.round(scale * 100)}%</button>
        <button style={zbtn} title="Zoom in (⌘+)" onClick={() => setZoom(z => clamp(z * 1.15))}>+</button>
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "initial": "chat",
  "chatSide": "left",
  "dropMode": "position",
  "inspector": false,
  "chrome": "warm",
  "overlay": "none",
  "devError": false
}/*EDITMODE-END*/;

// Sample toasts cycled by the dev "Fire a toast" button.
const WS_TOAST_SAMPLES = [
  { type: 'success', title: 'Session merged', description: 'refactor/auth-flow → main · 14 files, +312 −88.' },
  { type: 'error',   title: 'Build failed', description: "tsc exited 2 — Type error in SessionView.tsx:142. Click to open the session.", chatId: 's1' },
  { type: 'info',    title: 'Agent finished', description: 'Fix flaky tests · 3 tools run, all checks green.', chatId: 's1' },
  { type: 'warning', title: 'Worktree has uncommitted changes', description: 'Stash or commit before switching branches.' },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const toastIdx = useRef(0);
  const fireToast = () => {
    const s = WS_TOAST_SAMPLES[toastIdx.current % WS_TOAST_SAMPLES.length];
    toastIdx.current += 1;
    window.mfToast(s);
  };
  return (
    <>
      <window.MfErrorBoundary onReset={() => setTweak('devError', false)}>
        <ZoomStage designW={1440} designH={920}>
          <window.MainframeTabbed
            initial={t.initial}
            chatSide={t.chatSide}
            dropMode={t.dropMode}
            inspector={t.inspector}
            chrome={t.chrome}
            width={1440}
            height={920}
          />
        </ZoomStage>
        <window.WsBoom when={t.devError}/>
      </window.MfErrorBoundary>
      <window.MfToaster/>
      <window.ConnectionOverlay open={t.overlay === 'connecting'}/>
      <window.TutorialOverlay run={t.overlay === 'tutorial'} onClose={() => setTweak('overlay', 'none')}/>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Workspace">
          <TweakRadio
            label="Starting arrangement" value={t.initial}
            options={[
              { value: 'chat-files', label: 'Chat · Files' },
              { value: 'all',        label: 'Chat · Files + Run strip' },
              { value: 'chat-run',   label: 'Chat · Run' },
              { value: 'chat',       label: 'Chat only' },
            ]}
            onChange={v => setTweak('initial', v)}
          />
          <TweakRadio
            label="Chat side" value={t.chatSide}
            options={[{ value: 'left', label: 'Left' }, { value: 'right', label: 'Right' }]}
            onChange={v => setTweak('chatSide', v)}
          />
        </TweakSection>
        <TweakSection title="Drag a file into Run">
          <TweakRadio
            label="Drop mechanics" value={t.dropMode}
            options={[
              { value: 'position', label: 'A — center=tab · edge=split' },
              { value: 'tab',      label: 'B — always add a tab' },
            ]}
            onChange={v => setTweak('dropMode', v)}
          />
        </TweakSection>
        <TweakSection title="Appearance">
          <TweakRadio
            label="Theme" value={window.__mfTheme}
            options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
            onChange={v => window.setMfTheme(v)}
          />
        </TweakSection>
        <TweakSection title="Chrome">
          <TweakRadio
            label="Toolbar" value={t.chrome}
            options={[
              { value: 'warm',  label: 'Warm' },
              { value: 'white', label: 'White' },
              { value: 'glass', label: 'Glass' },
            ]}
            onChange={v => setTweak('chrome', v)}
          />
          <TweakToggle label="Inspector pane" value={t.inspector} onChange={v => setTweak('inspector', v)}/>
        </TweakSection>
        <TweakSection label="Window states (dev)">
          <TweakSelect
            label="Overlay" value={t.overlay}
            options={[
              { value: 'none',       label: 'None' },
              { value: 'connecting', label: 'Reconnecting…' },
              { value: 'tutorial',   label: 'First-run tour' },
            ]}
            onChange={v => setTweak('overlay', v)}
          />
          <TweakButton label="Fire a toast" onClick={fireToast}/>
          <TweakToggle label="Trigger render error" value={t.devError} onChange={v => setTweak('devError', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
