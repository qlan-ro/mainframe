[package]
name = "mainframe-services"
edition.workspace = true
version.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
reqwest = { workspace = true }
notify = { workspace = true }
dirs = { workspace = true }
nanoid = { workspace = true }
rand = { workspace = true }
dashmap = { workspace = true }
mainframe-types = { workspace = true }
mainframe-db = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
# test-util enables tokio's paused-clock helpers (advance / start_paused) used by
# the push-service staleness-timer tests. It's a feature toggle on the
# already-allowlisted tokio, not a new dependency.
tokio = { workspace = true, features = ["test-util"] }
