# Exercises: the `form:` alias for question steps, a `when`-conditional field, `options`, `textarea`, `timeout`.
version: 1
name: form-fixture
steps:
  - id: ask-details
    form:
      title: Tell us more
      timeout:
        afterMinutes: 10
        onTimeout: continue
      fields:
        - key: mode
          type: choice
          label: Mode
          options: [quick, thorough]
          required: true
        - key: notes
          type: textarea
          label: Notes
          when:
            key: mode
            equals: thorough
